version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bot_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bot_db
      MYSQL_USER: bot_user
      MYSQL_PASSWORD: bot_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - bot_network

  redis:
    image: redis:7-alpine
    container_name: bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - bot_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_api
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=bot_user
      - DB_PASSWORD=bot_password
      - DB_NAME=bot_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - bot_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
  redis_data:

networks:
  bot_network:
    driver: bridge
